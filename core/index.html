<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniConsole | Universal Terminal Component</title>
    <style>
        body { background-color: #121212; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 800px; }
        h1 { margin-bottom: 5px; color: #00ff41; }
        p { margin-bottom: 25px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="container">
        <h1>OmniConsole</h1>
        <p>Type "help" to see available commands or connect to your backend API.</p>

        <omni-console 
            theme="matrix" 
            api-url="http://127.0.0.1:8000/api/terminal">
        </omni-console>
    </div>

    <script src="omni-console.js"></script>
</body>
</html>
